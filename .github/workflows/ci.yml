name: MDR-TB Pipeline CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
        
    - name: Run Pipeline Tests
      run: |
        pytest tests/ -v --cov=engines --cov=models --cov=data_connectors --cov=generators
        
    - name: Deploy to Hugging Face Spaces
      if: github.ref == 'refs/heads/master'
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git remote add space https://hssling:$HF_TOKEN@huggingface.co/spaces/hssling/MDR-TB-Drug-Discovery
        git push --force space HEAD:main

    - name: Setup Kaggle Config
      if: github.ref == 'refs/heads/master'
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      run: |
        mkdir -p ~/.kaggle
        echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
        
    - name: Deploy Kaggle Dataset
      if: github.ref == 'refs/heads/master'
      run: |
        pip install kaggle
        # Update the dataset with the new repository changes
        kaggle datasets version -p . -m "Automated CI/CD update from GitHub" --dir-mode zip
