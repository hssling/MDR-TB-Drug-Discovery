name: MDR-TB Pipeline CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
        
    - name: Run Pipeline Tests
      run: |
        # Run pytest and generate a coverage report.
        # Strict computational evaluation only.
        pytest tests/ -v --cov=engines --cov=models --cov=data_connectors --cov=generators
        
    - name: Dry Run Execution
      run: |
        # Ensure the orchestrator can execute end-to-end with mock configs
        python run_pipeline.py
